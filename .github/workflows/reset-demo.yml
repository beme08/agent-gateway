name: Reset demo data (nightly)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Call reset-demo endpoint for both tenants
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          for email in admin@acme.test admin@globex.test; do
            echo "Reset for $email"
            npx tsx scripts/reset_demo.ts --email "$email"
          done
